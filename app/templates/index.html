{% extends 'base.html' %}

{% block content %}
<div class="mb-8 text-center sm:text-left">
    <h1 class="text-3xl font-bold mb-2">LearnHNS Market</h1>
    <p class="text-gray-600">Fixed-price "Buy Now" domains directly via Bob Wallet.</p>
</div>

<div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-6">
    {% for listing in listings %}
    <div class="bg-white p-6 rounded-lg shadow-sm border border-gray-100 hover:shadow-md transition">
        <h2 class="text-2xl font-bold mb-2 text-indigo-600 truncate" title="{{ listing.name }}">{{ listing.name }}</h2>
        <p class="text-gray-700 mb-4 font-semibold">{{ listing.price_hns }} HNS</p>
        <a href="{{ url_for('main.listing_detail', name=listing.name) }}" class="inline-block bg-indigo-50 text-indigo-700 px-4 py-2 rounded font-medium hover:bg-indigo-100 transition">
            View Details
        </a>
    </div>
    {% else %}
    <div class="col-span-full text-center py-16 bg-white rounded-lg border border-gray-100">
        <p class="text-gray-500 text-lg">No active listings found.</p>
    </div>
    {% endfor %}
</div>
{% endblock %}
