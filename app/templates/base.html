<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Handshake Marketplace</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/custom.css') }}">
</head>
<body class="bg-gray-50 text-gray-900 font-sans antialiased flex flex-col min-h-screen">
    <header class="bg-white shadow-sm border-b border-gray-200">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-4 flex justify-between items-center">
            <a href="{{ url_for('main.index') }}" class="text-xl font-bold text-indigo-600">HNS Market</a>
            <nav>
                <a href="{{ url_for('main.index') }}" class="text-gray-600 hover:text-indigo-600 font-medium">Browse</a>
            </nav>
        </div>
    </header>
    
    <main class="flex-grow max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-8 w-full">
        {% block content %}{% endblock %}
    </main>

    <footer class="bg-white mt-12 py-6 border-t border-gray-200 text-center text-gray-500 text-sm">
        <p>&copy; 2026 Handshake Marketplace Revival.</p>
    </footer>
</body>
</html>
